<!-- signin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Hallwayz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="form-page">

    <div class="up">    
        <img src="logo.png" 
        alt="Logo" class="logo">
    </div>

    <div class="form-card">

        <h2>Sign in</h2>

        <div class="input-group">
            <span class="icon">👤</span>
            <!-- ADDED id -->
            <input type="text" id="si_username" placeholder="Username">
        </div>

        <div class="input-group">
            <span class="icon">🔒</span>
            <!-- ADDED id -->
            <input type="password" id="si_password" placeholder="Password">
        </div>

        <button class="btn-submit" id="loginSubmit">Sign in</button>
        <br> <br> <br>
        <p class="subtext-center">
            Don't have an account? 
            <a href="signup.html">Sign up</a>
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
