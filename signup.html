<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Hallwayz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="form-page">
    <div class="up">    
        <img src="images/photo_6332540721310666853_x-removebg-preview 1.png" alt="Logo" class="logo">
    </div>

    <div class="form-card">
        <h2>Sign up</h2>
        <p class="subtext">Already have an account? <a href="signin.html">Sign in</a></p>
        
        <div class="input-group">
            <span class="icon">👤</span>
            <!-- ADDED id -->
            <input type="text" id="su_username" placeholder="Username">
        </div>
        <div class="input-group">
            <span class="icon">✉️</span>
            <!-- ADDED id -->
            <input type="email" id="su_email" placeholder="Email">
        </div>
        <div class="input-group">
            <span class="icon">🔒</span>
            <!-- ADDED id -->
            <input type="password" id="su_password" placeholder="Password">
        </div>
        <div class="input-group">
            <span class="icon">📞</span>
            <input type="tel" id="su_phone" placeholder="+63">
        </div>

        <button class="btn-submit" id="signupSubmit">Sign Up</button> 

    </div>

    <!-- ADDED -->
    <script src="script.js"></script>

</body>
</html>
